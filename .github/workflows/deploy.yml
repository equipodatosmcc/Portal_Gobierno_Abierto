name: Deploy Portal Gobierno Abierto

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute Deploy
        run: |
          # Esta es la nueva ubicación donde movimos la carpeta
          cd /home/deployer/Portal_Gobierno_Abierto

          git pull origin main

          # Usamos sudo para asegurar la ejecución del build
          sudo docker compose --env-file .env.server build app_gobierno_abierto
          sudo docker compose --env-file .env.server up -d app_gobierno_abierto

          sudo docker image prune -f
